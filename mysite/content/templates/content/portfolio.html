{% extends 'base.html' %}

{% block title %}Portfolio{% endblock %}

{% block content %}
<h1>Portfolio</h1>
<ul>
    {% for item in items %}
    <li>
        <h2>{{ item.title }}</h2>
        <p>{{ item.description }}</p>
        <p><strong>Tags:</strong> {{ item.tags }}</p>
        <p><a href="{{ item.media.url }}">View Media</a></p>
    </li>
    {% endfor %}
</ul>
{% endblock %}
