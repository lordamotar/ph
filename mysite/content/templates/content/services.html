{% extends 'base.html' %}

{% block title %}Services{% endblock %}

{% block content %}
<h1>Services</h1>
<ul>
    {% for service in services %}
    <li>
        <h2>{{ service.title }}</h2>
        <p>{{ service.description }}</p>
        <p><strong>Price:</strong> ${{ service.price }}</p>
        <form action="{% url 'order_service' service.id %}" method="post">
            {% csrf_token %}
            <button type="submit">Order Now</button>
        </form>
    </li>
    {% endfor %}
</ul>
{% endblock %}
